name: Cleanup Merged Branches

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Delete branches already merged into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --prune
          for branch in $(git branch -r --merged origin/main | grep -v 'origin/main$' | grep -v 'HEAD' | sed 's|origin/||'); do
            echo "Deleting merged branch: $branch"
            gh api repos/${{ github.repository }}/git/refs/heads/$branch -X DELETE || true
          done
