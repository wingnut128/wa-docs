name: Cleanup Merged Branches

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Delete branches already merged into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --prune
          for branch in $(git branch -r --merged origin/main | grep -v 'origin/main$' | grep -v 'HEAD' | sed 's|origin/||'); do
            echo "Deleting merged branch: $branch"
            gh api repos/${{ github.repository }}/git/refs/heads/$branch -X DELETE || true
          done
