name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    if: github.event.pull_request.merged == true && github.event.pull_request.user.login == 'wingnut128'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type from PR title
        id: bump
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qi '\[major\]'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$TITLE" | grep -qi '\[minor\]'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate next version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            case "${{ steps.bump.outputs.type }}" in
              major) NEXT="v$((MAJOR+1)).0.0" ;;
              minor) NEXT="v${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEXT="v${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping ${{ steps.bump.outputs.type }}: ${LATEST:-none} → $NEXT"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --latest
